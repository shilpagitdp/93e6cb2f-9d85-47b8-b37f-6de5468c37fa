version: '3.8'

services:
  longest-sequence-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: longest-sequence-solution:latest
    container_name: longest-sequence-app
    stdin_open: true  # Enable interactive mode (docker run -i)
    tty: true         # Enable pseudo-TTY (docker run -t)
    environment:
      - DOTNET_ENVIRONMENT=Development

